<svg viewBox="0 0 165 54" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Left side red semi-circle perfectly centered vertically -->
  <path d="M 35,6 A 21,21 0 0 0 35,48 Z" fill="#BE0028" />
  <!-- Right side white semi-circle making the circle complete and robust on any background -->
  <path d="M 35,6 A 21,21 0 0 1 35,48 Z" fill="white" />
  
  <!-- Palm tree branches scaled down slightly (0.72x) to fit fully inside the circle bounds -->
  <g transform="translate(35, 27) scale(0.72)">
    <!-- Left branches (white, overlaying the red semi-circle background) -->
    <path d="M0,0 C -2,-10 -6,-19 -9,-23 C -5,-15 -2,-8 0,0" fill="white" />
    <path d="M0,0 C -5,-9 -12,-16 -17,-19 C -10,-12 -3,-6 0,0" fill="white" />
    <path d="M0,0 C -8,-7 -17,-11 -22,-13 C -14,-8 -5,-4 0,0" fill="white" />
    <path d="M0,0 C -10,-4 -20,-4 -24,-6 C -16,-3 -6,-2 0,0" fill="white" />
    <path d="M0,0 C -10,-1 -21,-1 -25,0 C -17,1 -7,1 0,0" fill="white" />
    
    <!-- Right branches (red, overlaying the white semi-circle background) -->
    <path d="M0,0 C 2,-10 6,-19 9,-23 C 5,-15 2,-8 0,0" fill="#BE0028" />
    <path d="M0,0 C 5,-9 12,-16 17,-19 C 10,-12 3,-6 0,0" fill="#BE0028" />
    <path d="M0,0 C 8,-7 17,-11 22,-13 C 14,-8 5,-4 0,0" fill="#BE0028" />
    <path d="M0,0 C 10,-4 20,-4 24,-6 C 16,-3 6,-2 0,0" fill="#BE0028" />
    <path d="M0,0 C 10,-1 21,-1 25,0 C 17,1 7,1 0,0" fill="#BE0028" />
  </g>
  
  <!-- Bold red DKSH text -->
  <text x="68" y="38" fill="#BE0028" fontSize="31" fontWeight="900" fontFamily="'Noto Sans', Arial, sans-serif" letterSpacing="-1.5px">DKSH</text>
</svg>
